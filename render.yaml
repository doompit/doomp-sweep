services:
  - type: web
    name: doomps-sweep
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    disk:
      name: doomps-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: "/var/data/doomps.db"
      - key: ADMIN_KEY
        generateValue: true
      - key: ALLOWED_ORIGIN
        value: "https://sweep.doomps.xyz"
      - key: NODE_VERSION
        value: "22"
